<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form action="url ki link to set karna hai jisspe ye form send karna hai">
        <fieldset>
            <legend>Registration form</legend>
            <label for="1">full name :</label>
            <input type="text" name="" id="1">
            <br><br>
            <label for="2">email :</label>
            <input type="text" id="2">
            <br><br>
            <label for="3">phone :</label>
            <input type="tel" name="" id="3">
            <br><br>
            <label for="4">password :</label>
            <input type="password" id="4">
            <br><br>
            <label>gender :</label>
            <input type="radio" id="6" name="5">
            <label for="6">male</label>
            <input type="radio" id="7" name="5">
            <label for="7">female</label>
            <br><br>
            <label for="8">date of birth :</label>
            <input type="date" id="8">
            <br><br>
            <label for="9">school name :</label>
            <input type="text" id="9">
            <br><br>
            <label for="10">board :</label>
            <select id="10">
                <option value="select" disabled selected>select a option</option>
                <option value="a">cbse</option>
                <option value="b">icse</option>
                <option value="c">mpboard</option>
            </select>
            <br><br>
            <label for="11">year of passing :</label>
            <input type="number" id="11" min="2000" max="2025">
            <br><br>
            <label for="12">exam centre :</label>
            <select id="12">
                <option disabled selected>select a option</option>
                <option value="a">indore</option>
                <option value="b">ujjain</option>
                <option value="c">bhopal</option>
            </select>
            <br><br>
            <button>register</button>
        </fieldset>
    </form>
</body>
</html>
