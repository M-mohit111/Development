<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>form</title>
</head>
<body>
    <form>
        <h1>Employee detail form</h1>
        <label for="first">Full name :</label>
        <input type="text" id="first" placeholder="entre your name">
        <br><br>
        <label for="second">Email :</label>
        <input type="text" id="second" placeholder="entre your email">
        <br><br>
        <label for="third">Phone number :</label>
        <input type="tel" id="third" placeholder="999999999">
        <br><br>
        <label>Gender :</label>
        <input type="radio" id="four" name="fo">
        <label for="four">male</label>
        <input type="radio" id="fou" name="fo">
        <label for="fou">female</label>
        <br><br>
        <label for="five">job title :</label>
        <input type="text" id="five" placeholder="entre your department">
        <br><br>
        <label for="six">department :</label>
        <select name="department" id="six">
            <option disabled selected>select your department</option>
            <option value="engineer">engineer</option>
            <option value="engineer">doctor</option>
            <option value="engineer">finance</option>
            <option value="engineer">officer</option>
        </select>
        <br><br>
        <button>submit</button>
    </form>
</body>
</html>
