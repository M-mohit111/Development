<!DOCTYPE html>
<html>
<head>
    <title>Padding</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .mybox {
            background-color: lightblue;
            border: 1px solid blue;
            padding: 25px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>Padding</h1>
    <div class="mybox">
        <p>This box has 25 pixels of **padding** on all sides.</p>
    </div>
</body>
</html>
