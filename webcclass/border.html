<!DOCTYPE html>
<html>
<head>
<title>Borders</title>
<style>
  body {
    font-family: sans-serif;
    margin: 20px;
  }
  div {
    padding: 10px;
    margin-bottom: 15px;
    background-color: white;
  }
  .basic-border {
    border: 1px solid black;
  }
  .border-width {
    border-style: solid;
    border-width: 3px;
    border-color: blue;
  }
  .border-color {
    border: 2px solid;
    border-color: green;
  }
  .border-sides {
    border-top: 2px solid red;
    border-bottom: 2px dashed purple;
  }
  .border-shorthand {
    border: 1px dashed orange;
  }
  .rounded-border {
    border: 1px solid gray;
    border-radius: 8px;
  }
</style>
</head>
<body>
  <h1>different type of borders</h1>
  <div class="basic-border">
    <p>This is a **basic border** (1px solid black).</p>
  </div>
  <div class="border-width">
    <p>This border is **3 pixels wide** and blue.</p>
  </div>
  <div class="border-color">
    <p>This border is green.</p>
  </div>
  <div class="border-sides">
    <p>This box has different borders on its **top and bottom**.</p>
  </div>
  <div class="border-shorthand">
    <p>This uses the **shorthand** for a border (1px dashed orange).</p>
  </div>
  <div class="rounded-border">
    <p>This box has **rounded corners**.</p>
  </div>
</body>
</html>
