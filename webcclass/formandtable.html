<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Examples</title>
    
    <!-- Link to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Basic styles for the whole page */
        body {
            font-family: 'Roboto', sans-serif;
        }

        /* A container for the content */
        .container {
            width: 80%;
            margin: auto; /* Center the container */
            background-color: white;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }
        
        h2 {
            font-family: 'Playfair Display', serif;
            padding-bottom: 5px;
            margin-top: 20px;
        }

        /* --- Table Styles --- */
        table {
            width: 100%;
            border-collapse: collapse; /* Remove space between borders */
            margin-top: 15px;
            border: 1px solid #ccc; /* Add a border around the table */
        }

        th, td {
            border: 1px solid #ccc;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2; /* Light grey for header */
        }

        /* --- Form Styles --- */
        input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 8px;
            margin: 6px 0;
            box-sizing: border-box; /* Include padding and border in the element's total width and height */
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            width: 100%;
            background-color: #4CAF50; /* A green background */
            color: white;
            padding: 10px;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }

        input[type="submit"]:hover {
            background-color: #45a049; /* Darker green on hover */
        }

    </style>
</head>
<body>

    <div class="container">
        <h1>Name: Mohit Agrawal</h1>
        <h1>23BCE10276</h1>
        <div id="css-tables">
            <h2>CSS Tables</h2>
            <table>
                <thead>
                    <tr>
                        <th>First Name</th>
                        <th>Last Name</th>
                        <th>Country</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>mohit</td>
                        <td>agrawal</td>
                        <td>india</td>
                    </tr>
                    <tr>
                        <td>abc</td>
                        <td>def</td>
                        <td>usa</td>
                    </tr>
                     <tr>
                        <td>jkl</td>
                        <td>mno</td>
                        <td>uae</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- FORM EXAMPLE -->
        <div id="css-forms">
            <h2>CSS Forms</h2>
            <form action="#">
                <label for="fname">First Name</label>
                <input type="text" id="fname" name="firstname" placeholder="Your name..">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Your email..">

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Your password..">
            
                <input type="submit" value="Submit">
            </form>
        </div>

    </div>

</body>
</html>
