<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        h1 {
            display: none;
        }
        .model-display {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .box-wrapper {
            background-color: transparent;
            padding: 0;
            border: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 350px;
            box-shadow: none;
        }
        .margin-layer, .border-layer, .padding-layer, .content-area {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            text-align: center;
            color: #333;
            font-size: 1em;
            box-sizing: content-box;
        }
        .margin-layer {
            background-color: #f0f0f0;
            border: 2px dashed #a0a0a0;
            padding: 25px;
            width: 100%;
        }
        .border-layer {
            background-color: #5cb85c;
            border: none;
            padding: 20px;
            width: calc(100% - 4px);
        }
        .padding-layer {
            background-color: #ffffff;
            border: 1px dashed #d0d0d0;
            padding: 20px;
            width: calc(100% - 2px);
        }
        .content-area {
            background-color: #ffffff;
            border: 1px dashed #d0d0d0;
            padding: 20px;
            width: 150px;
            height: 70px;
        }
    </style>
</head>
<body>
    <div class="model-display">
        <div class="box-wrapper">
            <div class="margin-layer">
                Margin
                <div class="border-layer">
                    Border
                    <div class="padding-layer">
                        Padding
                        <div class="content-area">
                            Content
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
